<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div>
        <div class="scoreDisplay">
            <div class="choice">
                <div>Player Score: 0</div>
                <div>Player's Choice</div>
                <div class="choosing">choosing...</div>
            </div>
            <div class="choice">
                <div>Computer Score: 0</div>
                <div>Computer's Choice</div>
                <div class="choosing">choosing...</div>
            </div>
        </div>
        <div class="buttonContainer">
            <button class="selectionButton" id="rock">Rock</button>
            <button class="selectionButton" id="paper">Paper</button>
            <button class="selectionButton" id="scissors">Scissors</button>
        </div>

    </div>
    <div class ="consoleDisplay">Displaying Console Info</div>
    <script src="javascript.js"></script>
</body>
</html>
